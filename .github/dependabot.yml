version: 2
updates:
  # 🧩 Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 3
    labels:
      - "gh-actions"
      - "dependencies"
    groups:
      all-github-actions:
        patterns:
          - "*"

  # 🪄 Maintain dependencies for pnpm workspaces (or npm monorepo)
  # Release-age gating is handled by pnpm itself (minimumReleaseAge in pnpm-workspace.yaml)
  - package-ecosystem: "npm"  # Dependabot uses npm logic for pnpm
    directory: "/"            # Root where pnpm-lock.yaml lives
    schedule:
      interval: "monthly"
    labels:
      - "npm"
      - "dependencies"
    groups:
      all-pnpm-dependencies:
        patterns:
          - "*"
